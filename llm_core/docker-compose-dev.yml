
networks:
  atlas-net:
    external: true

services:
  atlas-llm-core:
    build: .
    container_name: atlas-llm-core-dev
    env_file: backend.dev.env
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./:/app
      - ./models:/app/models
    ports:
      - "8031:8030"
    restart: unless-stopped
    networks:
      - atlas-net
